[package]
name = "legionr-bpf-ebpf"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
aya-ebpf = { git = "https://github.com/aya-rs/aya" }
legionr-bpf-common = { path = "../legionr-bpf-common" }

[[bin]]
name = "legionr-bpf"
path = "src/main.rs"

# Built for the BPF target; this crate is compiled by the userspace build.rs.
[profile.dev]
opt-level = 3
[profile.release]
lto = true
