version: 2

# Tool pack: one place Dependabot watches every toolchain surface in the repo.
# The agent/ eBPF crate is its OWN Cargo workspace (excluded from the root
# workspace), so it needs its own entry — the root cargo job can't see it.
#
# Each ecosystem:
#   • cooldown 3 days  — wait 3 days after a release before opening a PR, so
#     yanked/hotfixed versions settle before we pick them up.
#   • grouped per ecosystem — all deps batched into ONE PR (not one PR per
#     package): a minor/patch group (auto-merged once CI is green, see
#     dependabot-auto-merge.yml) and a separate major group (left for review).
updates:
  # ── Rust: main workspace (legionr-core, legionr-cli, legionr-fim) ──────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]
      cargo-major:
        update-types: ["major"]

  # ── Rust: eBPF agent workspace (its own toolchain; aya is git-pinned) ──────
  - package-ecosystem: cargo
    directory: "/agent"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      agent-minor:
        update-types: ["minor", "patch"]
      agent-major:
        update-types: ["major"]

  # ── GitHub Actions used across all workflows ───────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      actions-minor:
        update-types: ["minor", "patch"]
      actions-major:
        update-types: ["major"]
