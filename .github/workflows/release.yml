name: Release on main

# Every push to main: verify the workspace, and only on success auto-bump the
# patch version, tag it, cut a GitHub Release, and advance the moving major tag
# (v1) so `uses: OpenSource-For-Freedom/legion_runner@v1` keeps resolving.
#
# Versioning is SemVer (MAJOR.MINOR.PATCH). First release defaults to 1.0.0 if
# no tag exists yet. The bump is chosen by: workflow_dispatch input, else a
# commit-message marker ([major]/[minor]) on the head commit, else patch. So a
# feature drop is released as a minor by merging with "[minor]" in the commit;
# routine pushes stay patch.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        type: choice
        default: patch
        options: [patch, minor, major]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ── Gate: the release only happens if this passes ──────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Harden runner (Legion, audit)
        uses: OpenSource-For-Freedom/legion_runner@v1
        with:
          egress-policy: audit
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - name: Check action JS
        run: |
          node --check action/index.js
          node --check action/monitor.js

  release:
    name: Tag & release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags + releases
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      major: ${{ steps.ver.outputs.major }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          # Highest existing vMAJOR.MINOR.PATCH tag, or empty.
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                    | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"

          # Bump precedence: workflow_dispatch input → commit-message marker
          # ([major]/[minor]) → patch. So a feature drop is cut by putting
          # "[minor]" in the merge commit; routine pushes stay patch.
          bump="${{ github.event.inputs.bump || '' }}"
          if [ -z "$bump" ]; then
            msg="$(git log -1 --format=%B 2>/dev/null || true)"
            case "$msg" in
              *'[major]'*) bump=major ;;
              *'[minor]'*) bump=minor ;;
              *)           bump=patch ;;
            esac
          fi
          echo "Bump: $bump"

          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            v="${latest#v}"; IFS=. read -r MA MI PA <<< "$v"
            case "$bump" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              *)     PA=$((PA+1)) ;;
            esac
            next="${MA}.${MI}.${PA}"
          fi

          echo "Previous: ${latest:-<none>}  →  Next: v${next}"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "major=v${next%%.*}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from CHANGELOG
        run: |
          set -euo pipefail
          # Body = the [Unreleased] section of CHANGELOG.md, if present.
          awk '/^## \[Unreleased\]/{f=1;next} /^## \[/{f=0} f' CHANGELOG.md \
            | sed '/./,$!d' > /tmp/notes.md || true
          if [ -s /tmp/notes.md ]; then
            echo "Using CHANGELOG [Unreleased] section for release notes."
          else
            echo "No CHANGELOG notes found; will fall back to generated notes."
          fi

      - name: Create release
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
            exit 0
          fi
          if [ -s /tmp/notes.md ]; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" \
              --notes-file /tmp/notes.md --latest
          else
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" \
              --generate-notes --latest
          fi

      - name: Advance moving major tag
        run: |
          set -euo pipefail
          major="${{ steps.ver.outputs.major }}"
          git tag -f "$major" "$GITHUB_SHA"
          git push origin -f "refs/tags/${major}"
          echo "Moved ${major} → ${GITHUB_SHA}"

  # ── Build the eBPF agent and attach it to the release ──────────────────────
  # The action downloads this (latest release asset) at runtime so `ebpf: auto`
  # engages without the consumer installing anything.
  agent:
    name: Build & attach legionr-bpf
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        # Compiled against the toolchain's LLVM (a prebuilt could mismatch the
        # nightly), so keep `cargo install` but retry — the crates.io download
        # can fail transiently (TLS EOF), which would otherwise fail the job.
        run: |
          for i in 1 2 3; do
            cargo install bpf-linker --locked && exit 0
            echo "bpf-linker install attempt $i failed; retrying in $((i*10))s"
            sleep $((i*10))
          done
          echo "bpf-linker install failed after 3 attempts"; exit 1
      - name: Build agent (release)
        run: cargo build --release
      - name: Attach binary to the release
        run: gh release upload "${{ needs.release.outputs.tag }}" target/release/legionr-bpf --clobber

  # ── Build the file-integrity agent and attach it to the release ────────────
  # legionr-fim is plain stable Rust (no eBPF toolchain), built from the main
  # workspace. The action downloads it at runtime so `file-integrity: auto`
  # engages without the consumer installing anything.
  fim:
    name: Build & attach legionr-fim
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build legionr-fim (release)
        run: cargo build --release -p legionr-fim
      - name: Attach binary to the release
        run: gh release upload "${{ needs.release.outputs.tag }}" target/release/legionr-fim --clobber

