name: Release on main

# Runs ONLY after the CI workflow succeeds on main (via workflow_run), so the
# full CI suite — rust, action tests, shellcheck, security audit, supply-chain —
# must pass before anything is released. Then it auto-bumps the patch version,
# tags it, cuts a GitHub Release, advances the moving major tag (v1), and builds
# + attaches the checksummed legionr-bpf / legionr-fim binaries.
#
# Versioning is SemVer. First release defaults to 1.0.0. The bump is: dispatch
# input → commit-message marker ([major]/[minor]) → patch.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        type: choice
        default: patch
        options: [patch, minor, major]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag & release
    # GATE: only release when CI succeeded (or on a manual dispatch). A failed or
    # cancelled CI run still fires workflow_run, but this condition skips it.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create tags + releases
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      major: ${{ steps.ver.outputs.major }}
      sha: ${{ steps.ver.outputs.sha }}
    env:
      GH_TOKEN: ${{ github.token }}
      # The exact commit CI validated (workflow_run) or the dispatch target.
      SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'off'
          dns-capture: 'true'

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          # Highest existing vMAJOR.MINOR.PATCH tag, or empty.
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                    | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"

          # Bump precedence: dispatch input → commit-message marker → patch.
          bump="${{ github.event.inputs.bump || '' }}"
          if [ -z "$bump" ]; then
            msg="$(git log -1 --format=%B "$SHA" 2>/dev/null || true)"
            case "$msg" in
              *'[major]'*) bump=major ;;
              *'[minor]'*) bump=minor ;;
              *)           bump=patch ;;
            esac
          fi
          echo "Bump: $bump"

          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            v="${latest#v}"; IFS=. read -r MA MI PA <<< "$v"
            case "$bump" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              *)     PA=$((PA+1)) ;;
            esac
            next="${MA}.${MI}.${PA}"
          fi

          echo "Previous: ${latest:-<none>}  →  Next: v${next}  (commit ${SHA})"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "major=v${next%%.*}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from CHANGELOG
        run: |
          set -euo pipefail
          awk '/^## \[Unreleased\]/{f=1;next} /^## \[/{f=0} f' CHANGELOG.md \
            | sed '/./,$!d' > /tmp/notes.md || true
          if [ -s /tmp/notes.md ]; then
            echo "Using CHANGELOG [Unreleased] section for release notes."
          else
            echo "No CHANGELOG notes found; will fall back to generated notes."
          fi

      - name: Create release
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
            exit 0
          fi
          if [ -s /tmp/notes.md ]; then
            gh release create "$tag" --target "$SHA" --title "$tag" \
              --notes-file /tmp/notes.md --latest
          else
            gh release create "$tag" --target "$SHA" --title "$tag" \
              --generate-notes --latest
          fi

      - name: Advance moving major tag
        run: |
          set -euo pipefail
          major="${{ steps.ver.outputs.major }}"
          # Forward-only: never move the major tag backward to an older commit.
          if git rev-parse -q --verify "refs/tags/${major}" >/dev/null; then
            if ! git merge-base --is-ancestor "refs/tags/${major}" "$SHA"; then
              echo "Refusing to move ${major} backward from $(git rev-parse --short "$major") to ${SHA}"; exit 0
            fi
          fi
          git tag -f "$major" "$SHA"
          git push origin -f "refs/tags/${major}"
          echo "Moved ${major} → ${SHA}"

  # ── Build the eBPF agent and attach it (+ checksum) to the release ──────────
  agent:
    name: Build & attach legionr-bpf
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.sha }}
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'off'
          dns-capture: 'true'
          job-summary: 'false'   # the release job emits the one table for this run
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        # Compiled against the toolchain's LLVM; retry to ride out transient
        # crates.io download failures.
        run: |
          for i in 1 2 3; do
            cargo install bpf-linker --locked && exit 0
            echo "bpf-linker install attempt $i failed; retrying in $((i*10))s"
            sleep $((i*10))
          done
          echo "bpf-linker install failed after 3 attempts"; exit 1
      - name: Build agent (release)
        run: cargo build --release
      - name: Attach binary + checksum to the release
        run: |
          cd target/release
          sha256sum legionr-bpf > legionr-bpf.sha256
          gh release upload "${{ needs.release.outputs.tag }}" legionr-bpf legionr-bpf.sha256 --clobber

  # ── Build the file-integrity agent and attach it (+ checksum) to the release ─
  fim:
    name: Build & attach legionr-fim
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.sha }}
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'off'
          dns-capture: 'true'
          job-summary: 'false'   # the release job emits the one table for this run
      - uses: dtolnay/rust-toolchain@stable
      - name: Build legionr-fim (release)
        run: cargo build --release -p legionr-fim
      - name: Attach binary + checksum to the release
        run: |
          cd target/release
          sha256sum legionr-fim > legionr-fim.sha256
          gh release upload "${{ needs.release.outputs.tag }}" legionr-fim legionr-fim.sha256 --clobber
