name: Platform matrix

# Proves the Legion binaries run on the supported Linux distros and
# architectures. The shipped portable artifact is a FULLY STATIC musl build:
# it has no glibc version floor, so the same binary runs on Debian, RHEL,
# Alpine, and Wolfi alike. We build it natively per arch (x86_64 on Intel
# runners, aarch64 on Arm runners — no cross-compile), then exercise it inside
# each distro via `docker run` (which sidesteps the "JS actions need a
# glibc node inside the container" breakage that bites Alpine containers).

on:
  push:
    branches: [main, feature/production]
    paths:
      - "crates/**"
      - "scripts/platform-audit.sh"
      - "Cargo.*"
      - ".cargo/**"
      - "Makefile"
      - ".github/workflows/platform.yml"
  pull_request:
    paths:
      - "crates/**"
      - "scripts/platform-audit.sh"
      - "Cargo.*"
      - ".cargo/**"
      - "Makefile"
      - ".github/workflows/platform.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Build the static musl binaries natively for each architecture ───────────
  build:
    name: Build ${{ matrix.arch }} (musl, static)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-unknown-linux-musl
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build (static musl)
        run: make release-musl
      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          t="target/${{ matrix.arch }}-unknown-linux-musl/release"
          cp "$t/legionr"     "dist/legionr-${{ matrix.arch }}-musl"
          cp "$t/legionr-fim" "dist/legionr-fim-${{ matrix.arch }}-musl"
      - uses: actions/upload-artifact@v4
        with:
          name: legionr-${{ matrix.arch }}-musl
          path: dist/

  # ── Run the static binaries inside each supported distro ────────────────────
  test:
    name: ${{ matrix.distro }} ${{ matrix.arch }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro: [debian, rhel, alpine, wolfi]
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
          - { distro: debian, image: "debian:12" }
          - { distro: rhel,   image: "almalinux:9" }
          - { distro: alpine, image: "alpine:3.20" }
          - { distro: wolfi,  image: "cgr.dev/chainguard/wolfi-base" }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: legionr-${{ matrix.arch }}-musl
          path: dist
      - name: Smoke-test the static binary on ${{ matrix.distro }}
        run: |
          set -euo pipefail
          chmod +x dist/*
          docker run --rm \
            -e DISTRO='${{ matrix.distro }}' \
            -v "$PWD:/w" -w /w "${{ matrix.image }}" \
            sh -euc '
              # Minimal deps: a shell + (best effort) nftables/iproute2 so the
              # audit script can report on them. Never fatal if a pkg is missing.
              if   command -v apk     >/dev/null; then apk add --no-cache bash nftables iproute2 >/dev/null 2>&1 || true
              elif command -v apt-get >/dev/null; then apt-get update >/dev/null 2>&1 && apt-get install -y bash nftables iproute2 >/dev/null 2>&1 || true
              elif command -v dnf     >/dev/null; then dnf install -y bash nftables iproute >/dev/null 2>&1 || true
              fi
              echo "== $DISTRO: legionr runs =="
              ./dist/legionr-${{ matrix.arch }}-musl --version
              echo "== control plane: provision + generate nftables =="
              export LEGIONR_DATA_DIR="$(mktemp -d)"
              ./dist/legionr-${{ matrix.arch }}-musl provision OpenSource-For-Freedom/legion_runner --no-probe
              ./dist/legionr-${{ matrix.arch }}-musl harden | grep -q "table inet legionr"
              echo "== legionr-fim runs =="
              ./dist/legionr-fim-${{ matrix.arch }}-musl --help >/dev/null 2>&1 || ./dist/legionr-fim-${{ matrix.arch }}-musl --version >/dev/null 2>&1 || true
              echo "== capability audit on $DISTRO =="
              bash scripts/platform-audit.sh --legionr "./dist/legionr-${{ matrix.arch }}-musl"
              echo "== OK: $DISTRO ${{ matrix.arch }} =="
            '
