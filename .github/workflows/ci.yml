name: CI

on:
  # PRs are validated via pull_request; push only runs on the protected branches
  # themselves. Previously push: ['**'] AND pull_request both fired on every
  # PR-branch commit, doubling every run. Now each commit runs CI once.
  #
  # Docs-only changes (Markdown / LICENSE / docs/) are ignored: they can't break
  # the build or the action, so CI (and the release it gates) is skipped. The
  # docs-passthrough workflow reports the same check names green so required
  # checks stay satisfied and docs PRs remain mergeable.
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Every job hardens with our own action (audit + dns-capture) but suppresses its
# per-job summary (job-summary: false). Instead each job emits its captured
# egress as an artifact, and the final `egress-report` job merges them all into a
# SINGLE run-level summary showing which job/process reached what, plus per-job
# diagnostics. (GitHub has no native run-level summary; this is the aggregation.)
jobs:
  rust:
    name: Rust test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 20   # hard cap: never let a hung job run to the 6h default
    steps:
      - uses: actions/checkout@v6

      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # Marketplace action
        with:
          # audit (monitor, don't firewall) + dns-capture ON to NAME destinations:
          # @v1 (>= 1.0.35) carries the teardown + systemd-resolved fixes, so
          # capturing is safe here. allowed-endpoints below pre-seed block mode for
          # the day we flip egress-policy to block; in audit they're just hints.
          egress-policy: audit
          ebpf: 'auto'
          dns-capture: 'true'
          job-summary: 'false'   # combined into the egress-report job
          allowed-endpoints: |
            static.rust-lang.org
            index.crates.io
            static.crates.io
            crates.io
            actions.githubusercontent.com
            blob.core.windows.net
          policy-file: .legion/egress-allowed.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo build (release)
        run: cargo build --release -p legionr-cli

      - name: Legion egress report (emit)
        if: always()
        run: node "$GITHUB_WORKSPACE/action/report.js" emit "$RUNNER_TEMP/legion-report.json"
      - name: Upload egress report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legion-egress-${{ github.job }}
          path: ${{ runner.temp }}/legion-report.json
          if-no-files-found: ignore
          retention-days: 1

  action:
    name: Action unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit       # monitor only; never breaks the build
          ebpf: 'auto'
          dns-capture: 'true'
          job-summary: 'false'   # combined into the egress-report job

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Syntax check
        run: |
          for f in action/*.js; do node --check "$f"; done

      - name: Unit + regression tests (node:test)
        run: node --test action/*.test.js

      - name: Legion egress report (emit)
        if: always()
        run: node "$GITHUB_WORKSPACE/action/report.js" emit "$RUNNER_TEMP/legion-report.json"
      - name: Upload egress report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legion-egress-${{ github.job }}
          path: ${{ runner.temp }}/legion-report.json
          if-no-files-found: ignore
          retention-days: 1

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'auto'
          dns-capture: 'true'
          job-summary: 'false'   # combined into the egress-report job
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

      - name: Legion egress report (emit)
        if: always()
        run: node "$GITHUB_WORKSPACE/action/report.js" emit "$RUNNER_TEMP/legion-report.json"
      - name: Upload egress report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legion-egress-${{ github.job }}
          path: ${{ runner.temp }}/legion-report.json
          if-no-files-found: ignore
          retention-days: 1

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'auto'
          dns-capture: 'true'
          job-summary: 'false'   # combined into the egress-report job
      - uses: dtolnay/rust-toolchain@stable
      # Install a prebuilt cargo-audit binary instead of `cargo install` (which
      # compiles it and pulls its whole dependency tree from crates.io — one
      # flaky download there fails the job, as it did with a transient TLS EOF).
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

      - name: Legion egress report (emit)
        if: always()
        run: node "$GITHUB_WORKSPACE/action/report.js" emit "$RUNNER_TEMP/legion-report.json"
      - name: Upload egress report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legion-egress-${{ github.job }}
          path: ${{ runner.temp }}/legion-report.json
          if-no-files-found: ignore
          retention-days: 1

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1.0.37   # dogfood our own action (audit)
        with:
          egress-policy: audit
          ebpf: 'auto'
          dns-capture: 'true'
          job-summary: 'false'   # combined into the egress-report job
      - name: cargo-deny (advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

      - name: Legion egress report (emit)
        if: always()
        run: node "$GITHUB_WORKSPACE/action/report.js" emit "$RUNNER_TEMP/legion-report.json"
      - name: Upload egress report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legion-egress-${{ github.job }}
          path: ${{ runner.temp }}/legion-report.json
          if-no-files-found: ignore
          retention-days: 1

  # One summary for the whole run: merge every job's egress artifact into a single
  # table (which job/process reached what) with a per-job diagnostics block.
  egress-report:
    name: Combined egress report
    needs: [rust, action, shellcheck, security, supply-chain]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download per-job egress reports
        uses: actions/download-artifact@v8
        with:
          pattern: legion-egress-*
          path: legion-reports
      - name: Render combined summary (all jobs)
        run: node action/report.js render legion-reports >> "$GITHUB_STEP_SUMMARY"
