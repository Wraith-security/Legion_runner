name: CI

on:
  # PRs are validated via pull_request; push only runs on the protected branches
  # themselves. Previously push: ['**'] AND pull_request both fired on every
  # PR-branch commit, doubling every run. Now each commit runs CI once.
  push:
    branches: [main, Primary]
  pull_request:
    branches: [main, Primary]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 20   # hard cap: never let a hung job run to the 6h default
    steps:
      - uses: actions/checkout@v6

      # NOTE: the Legion Harden Runner action is published to the Marketplace for
      # consumers; we no longer dogfood it in our own build pipeline. The action
      # itself is exercised by enforce-selftest / fim-selftest / ebpf-agent.

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo build (release)
        run: cargo build --release -p legionr-cli

  action:
    name: Action unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Syntax check
        run: |
          for f in action/*.js; do node --check "$f"; done

      - name: Unit + regression tests (node:test)
        run: node --test action/*.test.js

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Install a prebuilt cargo-audit binary instead of `cargo install` (which
      # compiles it and pulls its whole dependency tree from crates.io — one
      # flaky download there fails the job, as it did with a transient TLS EOF).
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cargo-deny (advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
