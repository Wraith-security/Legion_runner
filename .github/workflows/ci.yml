name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, Primary]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Harden runner (Legion)
        uses: OpenSource-For-Freedom/legion_runner@v1
        with:
          egress-policy: audit
          policy-file: .legion/egress-allowed.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo build (release)
        run: cargo build --release -p legionr-cli

  action:
    name: Action unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Syntax check
        run: |
          for f in action/*.js; do node --check "$f"; done

      - name: Unit + regression tests (node:test)
        run: node --test action/*.test.js

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Install a prebuilt cargo-audit binary instead of `cargo install` (which
      # compiles it and pulls its whole dependency tree from crates.io — one
      # flaky download there fails the job, as it did with a transient TLS EOF).
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cargo-deny (advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
