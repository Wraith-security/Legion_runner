name: 'Legion Harden Runner'
description: >-
  Hardened egress filtering and runtime network monitoring for GitHub Actions
  jobs. Open-source, dependency-free, and ephemeral.
author: 'Legion'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  egress-policy:
    description: '"audit" (monitor only, never breaks builds) or "block" (default-deny egress allowlist).'
    required: false
    default: 'audit'
  allowed-endpoints:
    description: >-
      Endpoints to permit in block mode, one per line or space/comma separated,
      as "host" or "host:port" ( "api.nuget.org:443"). GitHub/Actions
      endpoints are always allowed when allow-github is true.
    required: false
    default: ''
  allow-github:
    description: 'Always allow GitHub + Actions endpoints (so the job can still talk to GitHub).'
    required: false
    default: 'true'
  policy-file:
    description: >-
      Path (in the repo) to the learned egress allowlist. In audit mode the
      observed destinations are surfaced as a baseline; in block mode this file's
      hosts are part of the allowlist. Commit it to enforce a reviewable policy.
    required: false
    default: '.legion/egress-allowed.txt'
  learn:
    description: >-
      In audit mode, write/update the policy-file with the destinations observed
      this run (otherwise the baseline is only printed to the job summary).
    required: false
    default: 'false'
  disable-sudo:
    description: 'Revoke the runner user''s sudo after setup, to stop later privilege use.'
    required: false
    default: 'false'
  disable-telemetry:
    description: 'Do not emit any lifecycle events (Legion link / step summary stays local).'
    required: false
    default: 'false'
  legion-link:
    description: 'Optional Legion desktop endpoint (e.g. http://host:3000) to stream job egress events to.'
    required: false
    default: ''
  dns-capture:
    description: >-
      Route the resolver through a local logging forwarder to map connections to
      the exact domains the job resolved (more accurate than reverse DNS).
      Requires sudo; falls back to reverse DNS if unavailable.
    required: false
    default: 'true'
  sample-interval:
    description: 'Seconds between egress samples for the monitor.'
    required: false
    default: '3'

runs:
  using: 'node20'
  main: 'action/index.js'
  post: 'action/index.js'
