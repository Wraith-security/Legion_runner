<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Legion Runner">
  <title>Legion Runner — hardened, ephemeral, single-use GitHub Actions runner</title>
  <defs>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>

  <!-- matrix grid -->
  <g stroke="#22c55e" stroke-opacity="0.07" stroke-width="2">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M320 0 V640 M640 0 V640 M960 0 V640"/>
  </g>

  <!-- Chevron mark -->
  <g transform="translate(150 190)">
    <g fill="none" stroke="url(#green)" stroke-width="20" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
      <path d="M40 158 L128 74 L216 158"/>
      <path d="M74 168 L128 118 L182 168"/>
    </g>
    <path fill="url(#red)" stroke="#7f1d1d" stroke-width="3" stroke-linejoin="round"
          d="M106 116 L128 196 L150 116 L128 138 Z"/>
    <circle cx="128" cy="132" r="96" fill="none" stroke="#22c55e" stroke-width="2.5"
            stroke-opacity="0.28" stroke-dasharray="5 12"/>
  </g>

  <!-- Wordmark -->
  <text x="470" y="298" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="104" font-weight="800" fill="url(#wordmark)" letter-spacing="-2">Legion Runner</text>

  <text x="474" y="356" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace"
        font-size="29" fill="#86efac" letter-spacing="1">hardened · ephemeral · single-use GitHub Actions runner</text>

  <!-- Tagline pill -->
  <g transform="translate(474 398)">
    <rect x="0" y="0" rx="20" ry="20" width="410" height="44" fill="#16a34a" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.55"/>
    <circle cx="26" cy="22" r="7" fill="#ef4444"/>
    <text x="46" y="30" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace"
          font-size="22" fill="#ecfdf5">runs with joy on Linux</text>
  </g>
</svg>
