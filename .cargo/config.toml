# Cross-libc build settings for the static musl artifacts (Alpine).
#
# Only takes effect when you explicitly build `--target *-musl`; native glibc
# builds (the default) are untouched. `musl-gcc` is the musl wrapper from the
# `musl-tools` package and targets the host arch, so the same name works on both
# x86_64 and aarch64 runners. The C-dependent crate (`ring`) also needs its
# compiler pointed at musl-gcc via CC_<target> — the Makefile / CI set that.
[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"

[target.aarch64-unknown-linux-musl]
linker = "musl-gcc"
